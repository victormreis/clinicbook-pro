<section class="dashboard-shell">
  <article class="dashboard-card">
    <h1>Welcome, {{ firstName() }}!</h1>
    
    <div class="dashboard-actions">
      <button type="button" routerLink="/profile" class="secondary-btn">
        Edit Profile
      </button>

      <button type="button" routerLink="/specialties" class="primary-btn">
        View Specialties
      </button>

      @if (currentUser()?.role === 'admin') {
        <button type="button" routerLink="/admin/users" class="primary-btn">
          Manage System Users
        </button>

        <button type="button" routerLink="/admin/specialties/new" class="primary-btn">
          Add New Specialty
        </button>
      }

      <button type="button" (click)="logout()" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Logging out...' : 'Logout' }}
      </button>
    </div>
  </article>
</section>
