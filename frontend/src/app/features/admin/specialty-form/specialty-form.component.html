<section class="admin-form-container">
  <h2>Add New Medical Specialty</h2>

  <form (ngSubmit)="onSubmit()" #specialtyForm="ngForm">
    <div class="form-group">
      <label for="name">Specialty Name</label>
      <input 
        type="text" 
        id="name" 
        [(ngModel)]="name" 
        name="name" 
        required 
        placeholder="e.g., Cardiology">
    </div>

    <div class="form-group">
      <label for="description">Description (Optional)</label>
      <textarea 
        id="description" 
        [(ngModel)]="description" 
        name="description" 
        placeholder="Briefly describe the specialty...">
      </textarea>
    </div>

    @if (errorMessage()) {
      <p class="error-msg">{{ errorMessage() }}</p>
    }

    <div class="form-actions">
      <button type="submit" [disabled]="isSubmitting() || !name()" class="primary-btn">
        {{ isSubmitting() ? 'Saving...' : 'Create Specialty' }}
      </button>
      <button type="button" (click)="specialtyForm.reset()" class="secondary-btn">Cancel</button>
    </div>
  </form>
</section>
